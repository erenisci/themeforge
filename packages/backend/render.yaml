services:
  - type: web
    name: themeforge-api
    runtime: node
    buildCommand: npm install && cd packages/shared && npm run build && cd ../backend && npm run build
    startCommand: node packages/backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
